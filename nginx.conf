server {
  listen 80 default_server;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Long-cache hashed Angular bundles (chunks, main, polyfills, styles)
  location ~* ^/(chunk|main|polyfills|styles|runtime)-[A-Z0-9]+\.(js|css|map)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Static assets — short cache
  location ~* \.(?:ico|svg|png|jpg|jpeg|webp|gif|woff2?|ttf|eot)$ {
    expires 7d;
    add_header Cache-Control "public";
    try_files $uri =404;
  }

  # SPA fallback: any unmatched route serves index.html so Angular's router
  # can resolve client-side on refresh / deep-link.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Don't cache index.html itself
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  # Gzip
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
