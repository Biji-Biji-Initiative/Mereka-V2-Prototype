<header class="sticky top-0 z-30 bg-white border-b border-neutral-200">
  <div class="max-w-[1320px] mx-auto h-16 px-6 flex items-center gap-6">
    <a routerLink="/" class="flex items-center shrink-0" aria-label="Mereka home">
      <img src="logo-mereka.svg" alt="Mereka" class="h-7 w-auto" />
    </a>

    <nav class="hidden md:flex items-center gap-5 text-sm text-neutral-700">
      <a routerLink="/programs" routerLinkActive="text-primary-700 font-medium" class="hover:text-neutral-900">Programs</a>
      <a routerLink="/experiences" routerLinkActive="text-primary-700 font-medium" class="hover:text-neutral-900">Experiences</a>
      <a routerLink="/expertise" routerLinkActive="text-primary-700 font-medium" class="hover:text-neutral-900">Expertise</a>
      <a routerLink="/gigs" routerLinkActive="text-primary-700 font-medium" class="hover:text-neutral-900">Gigs</a>
      <a routerLink="/hubs" routerLinkActive="text-primary-700 font-medium" class="hover:text-neutral-900">Hubs</a>
      <a routerLink="/dashboard" routerLinkActive="text-primary-700 font-medium" class="hover:text-neutral-900">Dashboard</a>
    </nav>

    <div class="flex-1 max-w-md ml-auto">
      <label class="relative block">
        <span class="absolute inset-y-0 left-3 flex items-center text-neutral-400" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8" /><path d="m21 21-4.3-4.3" /></svg>
        </span>
        <input type="search" placeholder="What are you looking for?"
               class="w-full pl-9 pr-4 py-2 rounded-full bg-neutral-100 border border-transparent focus:outline-none focus:bg-white focus:border-neutral-300 text-sm" />
      </label>
    </div>

    <div class="flex items-center gap-3 shrink-0">
      <a routerLink="/checkout" class="relative text-neutral-500 hover:text-neutral-900" aria-label="Cart">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>
        <span *ngIf="cart.count() > 0" class="absolute -top-1 -right-2 min-w-[16px] h-[16px] px-1 text-[10px] flex items-center justify-center rounded-full bg-error text-white">{{ cart.count() }}</span>
      </a>

      <ng-container *ngIf="isLoading(); else loaded">
        <div class="w-8 h-8 rounded-full bg-neutral-100 animate-pulse"></div>
      </ng-container>
      <ng-template #loaded>
        <ng-container *ngIf="isLoggedIn(); else guest">
          <a routerLink="/inbox" class="text-neutral-500 hover:text-neutral-900" aria-label="Inbox">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2" /><path d="m3 7 9 6 9-6"/></svg>
          </a>
          <div class="relative group">
            <button class="w-8 h-8 rounded-full bg-primary-200 text-primary-800 font-semibold text-sm flex items-center justify-center overflow-hidden"
                    [attr.aria-label]="'Signed in as ' + user()?.name">
              <img *ngIf="user()?.profilePhoto; else initialsFallback" [src]="user()?.profilePhoto" [alt]="user()?.name" class="w-full h-full object-cover" />
              <ng-template #initialsFallback>{{ initials() }}</ng-template>
            </button>
            <div class="absolute right-0 mt-2 w-52 rounded-lg bg-white border border-neutral-200 shadow-md py-2 invisible group-hover:visible">
              <div class="px-4 py-2 border-b border-neutral-100">
                <div class="text-sm font-medium text-neutral-900">{{ user()?.name }}</div>
                <div class="text-xs text-neutral-500">{{ user()?.email }}</div>
              </div>
              <a routerLink="/dashboard" class="block px-4 py-2 text-sm hover:bg-neutral-50">My dashboard</a>
              <a routerLink="/experiences/admin" class="block px-4 py-2 text-sm hover:bg-neutral-50">My experiences</a>
              <a routerLink="/expertise/admin" class="block px-4 py-2 text-sm hover:bg-neutral-50">My expertise</a>
              <a routerLink="/gigs/admin" class="block px-4 py-2 text-sm hover:bg-neutral-50">My gigs</a>
              <a routerLink="/programs/admin" class="block px-4 py-2 text-sm hover:bg-neutral-50">My programs</a>
              <button type="button" class="block w-full text-left px-4 py-2 text-sm text-error hover:bg-neutral-50" (click)="signOut()">Sign out</button>
            </div>
          </div>
        </ng-container>
        <ng-template #guest>
          <a [href]="loginUrl()" class="text-sm text-neutral-700 hover:text-neutral-900 px-3 py-1.5">Log in</a>
          <a [href]="loginUrl()" class="text-sm font-medium text-white bg-neutral-900 hover:bg-neutral-700 rounded-full px-4 py-2">Sign up</a>
        </ng-template>
      </ng-template>
    </div>
  </div>
</header>
