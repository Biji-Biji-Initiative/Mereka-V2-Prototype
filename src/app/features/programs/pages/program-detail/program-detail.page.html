<div *ngIf="program() as p; else loading" class="bg-neutral-50 min-h-screen">
  <div class="max-w-[1320px] mx-auto px-4 py-6 grid grid-cols-12 gap-6">
    <aside class="col-span-12 md:col-span-2">
      <mereka-program-sidebar [program]="p" [showAdmin]="true" />
    </aside>

    <section class="col-span-12" [class.md:col-span-7]="!isAdmin()" [class.md:col-span-10]="isAdmin()">
      <ng-container *ngIf="!isAdmin()">
        <div class="rounded-lg overflow-hidden bg-gradient-to-br from-program-hero-start to-program-hero-end h-40 md:h-48 relative flex items-end p-6">
          <div>
            <h1 class="text-2xl md:text-3xl font-semibold text-neutral-900">Welcome to {{ p.title }}</h1>
            <p class="text-neutral-700 mt-1 max-w-md">{{ p.tagline }}</p>
          </div>
        </div>

        <div class="flex flex-wrap gap-2 mt-4 text-xs">
          <span class="inline-flex items-center px-3 py-1 rounded-full bg-program-chip-members text-success font-medium">{{ p.stats.memberCount | number }} Members</span>
          <span class="inline-flex items-center px-3 py-1 rounded-full bg-program-chip-experts text-warning font-medium">{{ p.stats.expertCount }} Experts</span>
          <span class="inline-flex items-center px-3 py-1 rounded-full bg-program-chip-mentors text-primary-700 font-medium">{{ p.stats.mentorCount }} Mentors</span>
        </div>

        <nav class="border-b border-neutral-200 mt-6 flex gap-6 text-sm overflow-x-auto">
          <a routerLink="feed" routerLinkActive="border-neutral-900 text-neutral-900" class="py-3 border-b-2 border-transparent text-neutral-500 hover:text-neutral-900 whitespace-nowrap">Feed</a>
          <a routerLink="announcements" routerLinkActive="border-neutral-900 text-neutral-900" class="py-3 border-b-2 border-transparent text-neutral-500 hover:text-neutral-900 whitespace-nowrap">Announcements</a>
          <a routerLink="discussions" routerLinkActive="border-neutral-900 text-neutral-900" class="py-3 border-b-2 border-transparent text-neutral-500 hover:text-neutral-900 whitespace-nowrap">Discussions</a>
          <a routerLink="curriculum" routerLinkActive="border-neutral-900 text-neutral-900" class="py-3 border-b-2 border-transparent text-neutral-500 hover:text-neutral-900 whitespace-nowrap">Curriculum</a>
          <a routerLink="resources" routerLinkActive="border-neutral-900 text-neutral-900" class="py-3 border-b-2 border-transparent text-neutral-500 hover:text-neutral-900 whitespace-nowrap">Resources</a>
          <a routerLink="members" routerLinkActive="border-neutral-900 text-neutral-900" class="py-3 border-b-2 border-transparent text-neutral-500 hover:text-neutral-900 whitespace-nowrap">Members</a>
          <a routerLink="about" routerLinkActive="border-neutral-900 text-neutral-900" class="py-3 border-b-2 border-transparent text-neutral-500 hover:text-neutral-900 whitespace-nowrap">About</a>
        </nav>
      </ng-container>

      <div [class.py-6]="!isAdmin()" [class.pt-2]="isAdmin()">
        <router-outlet />
      </div>
    </section>

    <aside *ngIf="!isAdmin()" class="col-span-12 md:col-span-3">
      <mereka-program-roster [slug]="p.slug" />
    </aside>
  </div>
</div>
<ng-template #loading>
  <div class="max-w-[1320px] mx-auto px-6 py-24 text-center text-neutral-500">Loading program…</div>
</ng-template>
