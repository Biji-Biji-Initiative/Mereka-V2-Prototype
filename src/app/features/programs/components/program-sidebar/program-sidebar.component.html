<div class="bg-white rounded-lg border border-neutral-200 p-4 sticky top-20 text-sm">
  <button type="button" class="text-neutral-400 hover:text-neutral-700 inline-flex items-center gap-1 mb-4" (click)="goBack()">
    <span aria-hidden="true">←</span> Programs
  </button>
  <div class="flex items-center gap-2 mb-4">
    <div class="w-9 h-9 rounded-lg bg-primary-100 text-primary-800 flex items-center justify-center font-semibold uppercase">
      {{ program().title[0] }}
    </div>
    <div class="leading-tight overflow-hidden">
      <div class="font-semibold truncate">{{ program().title }}</div>
      <div class="text-xs text-neutral-500 truncate">{{ program().ownerHub.hubName }}</div>
    </div>
  </div>
  <nav class="space-y-4">
    <div *ngFor="let group of navGroups">
      <div class="text-[11px] uppercase tracking-widest text-neutral-400 mb-2">{{ group.label }}</div>
      <ul class="space-y-1">
        <li *ngFor="let item of group.items">
          <a [routerLink]="item.link" routerLinkActive="bg-neutral-100 text-neutral-900 font-medium"
             class="flex items-center justify-between px-3 py-1.5 rounded-md text-neutral-600 hover:bg-neutral-50">
            <span>{{ item.label }}</span>
          </a>
        </li>
      </ul>
    </div>
    <div *ngIf="showAdmin()">
      <div class="text-[11px] uppercase tracking-widest text-neutral-400 mb-2">{{ adminGroup.label }}</div>
      <ul class="space-y-1">
        <li *ngFor="let item of adminGroup.items">
          <a [routerLink]="item.link" routerLinkActive="bg-neutral-100 text-neutral-900 font-medium"
             class="flex items-center justify-between px-3 py-1.5 rounded-md text-neutral-600 hover:bg-neutral-50">
            <span>{{ item.label }}</span>
          </a>
        </li>
      </ul>
    </div>
  </nav>
</div>
