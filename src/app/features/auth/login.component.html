<div class="min-h-screen flex">
  <!-- Left Panel -->
  <div class="w-full lg:w-[45%] flex flex-col px-8 sm:px-16 py-8">
    <!-- Back button -->
    <button type="button"
      class="btn btn-ghost btn-sm mb-12 self-start"
     
      (click)="goBack()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5"/>
        <path d="m12 19-7-7 7-7"/>
      </svg>
      Back
    </button>

    <!-- Logo -->
    <div class="flex justify-center mb-10">
      <img src="mereka-logo.svg" alt="mereka" class="h-24" />
    </div>

    <!-- EMAIL STEP -->
    <div *ngIf="step() === 'email'" class="max-w-sm mx-auto w-full">
      <h1 class="text-2xl font-bold text-neutral-900 mb-2">Log in to your account</h1>
      <p class="text-sm text-neutral-500 mb-6">Enter your email to continue</p>

      <label class="block text-sm font-medium text-neutral-700 mb-1.5">Email Address</label>
      <input
        type="email"
        [ngModel]="email()"
        (ngModelChange)="email.set($event)"
        placeholder="you@example.com"
        class="w-full px-4 py-3 rounded-xl bg-neutral-100 text-sm focus:outline-none focus:ring-2 focus:ring-neutral-300"
        (keydown.enter)="goToMethodSelect()"
      />

      <p *ngIf="error()" class="text-xs text-red-500 mt-2">{{ error() }}</p>

      <button
        type="button"
        class="btn btn-primary btn-block btn-lg mt-4"
       
        (click)="goToMethodSelect()">
        Continue
      </button>

      <!-- Quick login — click to sign in instantly -->
      <div class="mt-8">
        <p class="text-xs text-neutral-400 mb-3 text-center">Quick login — click to sign in instantly</p>
        <div class="space-y-2">
          <button *ngFor="let acct of quickAccounts"
            type="button"
            class="w-full flex items-center gap-3 px-4 py-3 rounded-xl bg-neutral-50 hover:bg-neutral-100 transition-colors text-left"
            style="border:1px solid #e5e7eb"
            (click)="quickLogin(acct.email)">
            <span class="w-9 h-9 rounded-full flex items-center justify-center text-white text-sm font-semibold shrink-0"
                  [style.background-color]="acct.color">
              {{ acct.initial }}
            </span>
            <div class="flex-1 min-w-0">
              <div class="text-sm font-medium text-neutral-900">{{ acct.name }}</div>
              <div class="text-xs text-neutral-500">{{ acct.email }}</div>
            </div>
            <span class="text-xs text-neutral-400 uppercase tracking-wide shrink-0">{{ acct.badge }}</span>
          </button>
        </div>
      </div>
    </div>

    <!-- METHOD STEP -->
    <div *ngIf="step() === 'method'" class="max-w-sm mx-auto w-full">
      <h1 class="text-2xl font-bold text-neutral-900 mb-1">How would you like to sign in?</h1>
      <p class="text-sm text-neutral-500 mb-6">Signing in as <strong class="text-neutral-900">{{ email() }}</strong></p>

      <button
        type="button"
        class="btn btn-primary btn-block btn-lg mb-3"
       
        (click)="chooseOtp()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="5" width="18" height="14" rx="2"/>
          <path d="m3 7 9 6 9-6"/>
        </svg>
        Email me a one-time code
      </button>

      <button
        type="button"
        class="btn btn-secondary btn-block btn-lg"
        (click)="choosePassword()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        Use password
      </button>

      <p *ngIf="error()" class="text-xs text-amber-600 mt-3">{{ error() }}</p>

      <button
        type="button"
        class="btn btn-ghost btn-sm mx-auto mt-6"
       
        (click)="step.set('email'); email.set('')">
        Use a different email
      </button>
    </div>

    <!-- PASSWORD STEP -->
    <div *ngIf="step() === 'password'" class="max-w-sm mx-auto w-full">
      <h1 class="text-2xl font-bold text-neutral-900 mb-2">Log in to your account</h1>

      <label class="block text-sm font-medium text-neutral-700 mb-1.5">Password</label>
      <div class="relative">
        <input
          [type]="showPassword() ? 'text' : 'password'"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          placeholder="Enter your password"
          class="w-full px-4 py-3 pr-12 rounded-xl bg-neutral-100 text-sm focus:outline-none focus:ring-2 focus:ring-neutral-300"
          (keydown.enter)="signIn()"
        />
        <button
          type="button"
          class="absolute right-3 top-1/2 -translate-y-1/2 text-neutral-400 hover:text-neutral-600 bg-transparent"
         
          (click)="togglePassword()">
          <svg *ngIf="!showPassword()" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg *ngIf="showPassword()" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>

      <p *ngIf="error()" class="text-xs text-red-500 mt-2">{{ error() }}</p>

      <button
        type="button"
        class="btn btn-primary btn-block btn-lg mt-4"
       
        (click)="signIn()">
        Sign In
      </button>

      <button
        type="button"
        class="btn btn-ghost btn-sm mx-auto mt-4"
       >
        Forgot password?
      </button>
    </div>
  </div>

  <!-- Right Panel - Gradient -->
  <div class="hidden lg:flex lg:w-[55%] items-start justify-center pt-16 relative overflow-hidden"
       style="background: linear-gradient(135deg, #f0fdf4 0%, #e0f7fa 30%, #f3e8ff 60%, #fce7f3 100%)">
    <div class="bg-white/60 backdrop-blur-sm rounded-3xl px-12 py-10 max-w-lg" style="border:1px solid rgba(255,255,255,0.5)">
      <h2 class="text-4xl font-bold text-[#1a1623] leading-tight">
        Connect with leading<br/>Experts &amp; Services.
      </h2>
    </div>
  </div>
</div>
